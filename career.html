<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Career Application Form</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success-color: #16a34a;
            --error-color: #dc2626;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 600px;
        }

        .form-header {
            margin-bottom: 28px;
            text-align: center;
        }

        .form-header h2 {
            font-size: 26px;
            color: #0f172a;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .form-header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #334155;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            transition: all 0.2s ease;
            background-color: #fff;
            color: var(--text-main);
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .btn-submit:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.7;
        }

        #result {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            display: none;
            font-weight: 500;
        }

        #result.success {
            display: block;
            background-color: #dcfce7;
            color: var(--success-color);
            border: 1px solid #bbf7d0;
        }

        #result.error {
            display: block;
            background-color: #fee2e2;
            color: var(--error-color);
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <h2>Career Application Form</h2>
        <p>Apply now by filling up your details below.</p>
    </div>

    <form id="form" method="POST">
        <!-- Web3Forms Config Key -->
        <input type="hidden" name="access_key" value="21a517e3-1904-4a3c-9638-ac5684ff5dcb">
        <input type="checkbox" name="botcheck" style="display: none;">

        <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
            <label for="message">Cover Letter / Message *</label>
            <textarea id="message" name="message" placeholder="Describe your experience or paste your cover letter here..." required></textarea>
        </div>

        <button type="submit" class="btn-submit">Submit Form</button>
    </form>

    <div id="result"></div>
</div>

<script>
    const form = document.getElementById('form');
    const result = document.getElementById('result');
    const submitBtn = form.querySelector('button[type="submit"]');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        result.style.display = 'block';
        result.className = ''; 
        result.innerHTML = "Sending...";
        
        const originalText = submitBtn.textContent;
        submitBtn.textContent = "Sending...";
        submitBtn.disabled = true;

        const formData = new FormData(form);

        try {
            const response = await fetch("https://api.web3forms.com/submit", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                result.className = 'success';
                result.innerHTML = "Form Submitted Successfully";
                form.reset();
            } else {
                result.className = 'error';
                result.innerHTML = data.message || "Something went wrong.";
            }
        } catch (error) {
            console.error(error);
            result.className = 'error';
            result.innerHTML = "Network error. Please try again.";
        } finally {
            submitBtn.textContent = originalText;
            submitBtn.disabled = false;
            
            setTimeout(() => {
                result.style.display = 'none';
            }, 5000);
        }
    });
</script>

</body>
</html>
